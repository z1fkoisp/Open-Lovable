name: Nightly Runner Cleanup
'on':
  schedule:
  - cron: 0 12 * * *
  workflow_dispatch: null
jobs:
  cleanup:
    runs-on: macos-latest
    steps:
    - name: "Guard \u2014 run only on ci1"
      id: guard
      run: "if [ \"$RUNNER_NAME\" = \"ci1\" ]; then\n  echo \"run_cleanup=true\" >>\
        \ \"$GITHUB_OUTPUT\"\n  echo \"Running cleanup on runner: $RUNNER_NAME\"\n\
        else\n  echo \"run_cleanup=false\" >> \"$GITHUB_OUTPUT\"\n  echo \"Skipping\
        \ cleanup: runner is '$RUNNER_NAME', expected ci1\"\nfi\n"
    - name: Checkout (for cleanup script)
      if: steps.guard.outputs.run_cleanup == 'true'
      uses: actions/checkout@v4
    - name: Nightly disk cleanup
      if: steps.guard.outputs.run_cleanup == 'true'
      env:
        CI_NIGHTLY_CLEANUP: '1'
      run: bash scripts/ci-cleanup-macos.sh
